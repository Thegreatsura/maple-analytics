<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<title>Maple</title>

		<meta
			name="description"
			content="Open-source observability platform. Traces, logs, and metrics for your distributed systems."
		/>
		<meta property="og:title" content="Maple" />
		<meta
			property="og:description"
			content="Open-source observability platform. Traces, logs, and metrics for your distributed systems."
		/>
		<meta property="og:image" content="/og-image.png" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Maple" />
		<meta
			name="twitter:description"
			content="Open-source observability platform. Traces, logs, and metrics for your distributed systems."
		/>
		<meta name="twitter:image" content="/og-image.png" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" href="/favicon.ico" />

		<!-- Apply the saved theme before first paint to avoid a flash of the wrong theme.
		     Must stay in sync with the theme store in @maple/ui/hooks/use-theme
		     (storage key "maple-theme", `light`/`dark` class on <html>, default "dark"). -->
		<script>
			;(() => {
				try {
					let theme = localStorage.getItem("maple-theme") || "dark"
					if (theme !== "light" && theme !== "dark") theme = "dark"
					const root = document.documentElement
					root.classList.remove("light", "dark")
					root.classList.add(theme)
					root.style.colorScheme = theme
				} catch {}
			})()
		</script>
	</head>
	<body>
		<!-- Pre-paint cold-boot splash. The app is client-rendered (createRoot,
		     no SSR) and styles.css/Geist load with the JS bundle, so the first
		     paint would otherwise be a blank #app. This self-contained, JS-free
		     copy of <BootSplash /> (apps/web/src/components/boot-splash.tsx)
		     paints immediately, themed via the html.dark/.light class the head
		     script already set. It lives inside #app, so React's first commit
		     replaces it with the identical-looking React splash — no blank
		     frame, no flash. Keep it in visual sync with boot-splash.tsx. -->
		<div id="app">
			<div class="maple-bootshell" role="status" aria-label="Loading Maple">
				<style>
					.maple-bootshell {
						--boot-bg: oklch(0.207 0.008 67);
						--boot-amber: oklch(0.714 0.154 59);
						--boot-muted: oklch(0.603 0.023 72);
						position: fixed;
						inset: 0;
						display: flex;
						flex-direction: column;
						align-items: center;
						justify-content: center;
						gap: 24px;
						background: var(--boot-bg);
					}
					html.light .maple-bootshell {
						--boot-bg: #fff;
						--boot-amber: oklch(0.66 0.16 59);
						--boot-muted: oklch(0.552 0.016 285.938);
					}
					.maple-bootshell__mark {
						display: flex;
						width: 44px;
						height: 44px;
						align-items: center;
						justify-content: center;
						border-radius: 11px;
						background: linear-gradient(
							155deg,
							color-mix(in oklab, var(--boot-amber) 86%, white),
							var(--boot-amber)
						);
						box-shadow:
							0 10px 30px -8px color-mix(in oklab, var(--boot-amber) 50%, transparent),
							inset 0 1px 0 color-mix(in oklab, white 35%, transparent);
					}
					.maple-bootshell__trace {
						position: relative;
						width: 200px;
						height: 73px;
					}
					.maple-bootshell__track,
					.maple-bootshell__span {
						position: absolute;
						height: 9px;
						border-radius: 9999px;
					}
					.maple-bootshell__track {
						background: color-mix(in oklab, var(--boot-amber) 9%, transparent);
					}
					.maple-bootshell__span {
						background: var(--boot-amber);
						transform-origin: left center;
						transform: scaleX(0);
						opacity: 0;
						animation: maple-bootshell-land 2.4s cubic-bezier(0.22, 1, 0.36, 1) infinite;
					}
					.maple-bootshell__track--1,
					.maple-bootshell__span--1 {
						top: 0;
						left: 0;
						width: 200px;
					}
					.maple-bootshell__track--2,
					.maple-bootshell__span--2 {
						top: 16px;
						left: 14px;
						width: 124px;
					}
					.maple-bootshell__track--3,
					.maple-bootshell__span--3 {
						top: 32px;
						left: 28px;
						width: 70px;
					}
					.maple-bootshell__track--4,
					.maple-bootshell__span--4 {
						top: 48px;
						left: 96px;
						width: 52px;
					}
					.maple-bootshell__track--5,
					.maple-bootshell__span--5 {
						top: 64px;
						left: 140px;
						width: 56px;
					}
					.maple-bootshell__span--1 {
						animation-delay: 0s;
					}
					.maple-bootshell__span--2 {
						animation-delay: 0.13s;
					}
					.maple-bootshell__span--3 {
						animation-delay: 0.26s;
					}
					.maple-bootshell__span--4 {
						animation-delay: 0.42s;
					}
					.maple-bootshell__span--5 {
						animation-delay: 0.58s;
					}
					@keyframes maple-bootshell-land {
						0% {
							transform: scaleX(0);
							opacity: 0;
						}
						13% {
							transform: scaleX(1);
							opacity: 1;
						}
						66% {
							transform: scaleX(1);
							opacity: 1;
						}
						84% {
							transform: scaleX(1);
							opacity: 0.2;
						}
						100% {
							transform: scaleX(0);
							opacity: 0;
						}
					}
					.maple-bootshell__scan {
						position: absolute;
						top: -6px;
						bottom: -6px;
						left: 0;
						width: 2px;
						border-radius: 2px;
						background: linear-gradient(
							180deg,
							transparent,
							color-mix(in oklab, var(--boot-amber) 85%, transparent),
							transparent
						);
						box-shadow: 0 0 10px 1px color-mix(in oklab, var(--boot-amber) 45%, transparent);
						transform: translateX(-2px);
						opacity: 0;
						animation: maple-bootshell-scan 2.4s linear infinite;
					}
					@keyframes maple-bootshell-scan {
						0% {
							transform: translateX(-2px);
							opacity: 0;
						}
						8% {
							opacity: 0.65;
						}
						78% {
							opacity: 0.65;
						}
						100% {
							transform: translateX(202px);
							opacity: 0;
						}
					}
					.maple-bootshell__caption {
						margin: 0;
						font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
						font-size: 12px;
						letter-spacing: 0.02em;
						color: var(--boot-muted);
					}
					@media (prefers-reduced-motion: reduce) {
						.maple-bootshell__span {
							transform: scaleX(1);
							opacity: 1;
							animation: none;
						}
						.maple-bootshell__scan {
							display: none;
						}
					}
				</style>
				<div class="maple-bootshell__mark">
					<svg
						viewBox="0 0 24 24"
						width="24"
						height="24"
						fill="none"
						stroke="#fff"
						stroke-width="2.4"
						stroke-linecap="round"
						stroke-linejoin="round"
						aria-hidden="true"
					>
						<path d="M5 18V7l7 7 7-7v11" />
					</svg>
				</div>
				<div class="maple-bootshell__trace" aria-hidden="true">
					<span class="maple-bootshell__track maple-bootshell__track--1"></span>
					<span class="maple-bootshell__track maple-bootshell__track--2"></span>
					<span class="maple-bootshell__track maple-bootshell__track--3"></span>
					<span class="maple-bootshell__track maple-bootshell__track--4"></span>
					<span class="maple-bootshell__track maple-bootshell__track--5"></span>
					<span class="maple-bootshell__span maple-bootshell__span--1"></span>
					<span class="maple-bootshell__span maple-bootshell__span--2"></span>
					<span class="maple-bootshell__span maple-bootshell__span--3"></span>
					<span class="maple-bootshell__span maple-bootshell__span--4"></span>
					<span class="maple-bootshell__span maple-bootshell__span--5"></span>
					<span class="maple-bootshell__scan"></span>
				</div>
				<p class="maple-bootshell__caption">Collecting spans…</p>
			</div>
		</div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
