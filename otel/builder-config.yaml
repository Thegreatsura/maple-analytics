# OpenTelemetry Collector Builder config — produces a custom collector
# binary that bundles the standard contrib receivers/processors with our
# Maple ClickHouse exporter (../packages/otel-collector-maple-exporter).
#
# To build:
#   go install go.opentelemetry.io/collector/cmd/builder@v0.151.0
#   builder --config=otel/builder-config.yaml
#
# Versions: pinned to OTel Collector release 0.151.x — stable APIs at v1.57.0,
# experimental modules at v0.151.0. Keep this file's pins in lockstep with
# ../packages/otel-collector-maple-exporter/go.mod.

dist:
  name: otel-collector-maple
  description: "OpenTelemetry Collector with Maple ClickHouse exporter"
  output_path: ./bin

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.151.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.151.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.151.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.151.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.151.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.151.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.151.0
  # Maple's custom exporter — local module via replaces directive below.
  - gomod: github.com/makisuo/maple/packages/otel-collector-maple-exporter v0.0.0
    name: mapleexporter

connectors:
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.151.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/spanmetricsconnector v0.151.0

# Local exporter package not yet published as a versioned module — use a
# relative path so ocb resolves it from the working tree. The path is
# relative to the generated go.mod which lives in `./bin`, so one `../`
# climbs back to the maple repo root.
replaces:
  - github.com/makisuo/maple/packages/otel-collector-maple-exporter => ../packages/otel-collector-maple-exporter
