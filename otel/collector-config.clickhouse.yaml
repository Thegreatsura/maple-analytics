# OpenTelemetry Collector Configuration
# Configured for internal OTLP ingest forwarding to Tinybird.
# Prometheus scraping moved to the standalone scraper service (apps/scraper),
# which talks to the Maple API's /api/internal/scrape-* endpoints directly.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 5000
    send_batch_max_size: 10000

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  maple:
    # Docker service name — NOT localhost (that's the container itself)
    endpoint: http://clickhouse:8123
    database: default
    username: maple
    password: ${env:MAPLE_CLICKHOUSE_PASSWORD}
    # Must match MAPLE_DEFAULT_ORG_ID / ingest static org override
    org_id: default
    timeout: 30s
    # Table names default to traces, logs, metrics_* — only override if you renamed tables
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
      # No storage: file_storage — in-memory queue is fine for local dev

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [maple]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [maple]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [maple]

  telemetry:
    logs:
      level: info
