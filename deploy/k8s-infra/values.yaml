global:
    clusterName: ""
    deploymentEnvironment: ""
    cloud: ""

maple:
    ingest:
        # OTLP HTTP base endpoint. The collector appends /v1/{traces,logs,metrics}.
        # Defaults to Maple's hosted ingest gateway. Self-hosted installs should
        # override this with their own ingest URL (e.g. http://maple-ingest:3474
        # for an in-cluster deployment).
        endpoint: "https://ingest.maple.dev"
        tls:
            insecure: false
            insecureSkipVerify: false
        compression: gzip
    ingestKey:
        # Prefer existingSecret in production.
        value: ""
        existingSecret:
            name: ""
            key: ""

    # Direct-to-Tinybird shipping. When enabled, the agent + cluster collector
    # use the OTel `tinybird` exporter (already present in opentelemetry-
    # collector-contrib) to write straight to a Tinybird endpoint — typically a
    # self-hosted Tinybird-Local in the same cluster — instead of, or alongside,
    # Maple's hosted ingest. Useful for self-hosted Maple deployments that want
    # zero outbound internet hops for their telemetry.
    #
    # `mode: replace`  → ship ONLY to Tinybird. The `otlphttp/maple` exporter
    #                    and its env vars are not rendered.
    # `mode: also`     → ship to BOTH `otlphttp/maple` AND Tinybird. Useful for
    #                    side-by-side validation while migrating.
    tinybirdExport:
        enabled: false
        mode: replace
        # e.g. http://tinybird.tinybird.svc.cluster.local:7181 (self-hosted) or
        # https://api.tinybird.co (Tinybird Cloud).
        endpoint: ""
        # Maple org id stamped onto every span/log/metric as the
        # `maple_org_id` resource attribute. The Tinybird datasources route on
        # this column, so it MUST be set when tinybirdExport is enabled. Look
        # it up in the Maple UI under Settings → Self-hosted Tinybird, or via
        # the Maple API (org.id, the `org_*` prefixed ULID).
        orgId: ""
        timeout: 30s
        # Bearer token for the Tinybird workspace. Prefer existingSecret in
        # production — the chart-managed Secret is convenience only.
        token:
            value: ""
            existingSecret:
                name: ""
                key: ""
        # Datasource names per signal. Override if your Tinybird workspace uses
        # different names.
        datasources:
            traces: traces
            logs: logs
            metrics:
                sum: metrics_sum
                gauge: metrics_gauge
                histogram: metrics_histogram
                exponentialHistogram: metrics_exponential_histogram
        retryOnFailure:
            enabled: true
            initialInterval: 1s
            maxInterval: 30s
            maxElapsedTime: 300s
        # In-memory queue. File-storage isn't enabled here because the agent's
        # filesystem isn't writable by default — flip to file-backed in a later
        # change if persistent buffering matters.
        sendingQueue:
            enabled: true
            numConsumers: 8
            queueSize: 10000

    # Direct-to-ClickHouse shipping. When enabled, the agent + cluster
    # collector use Maple's custom `mapleexporter` (built into the custom
    # collector image — see deploy/k8s-infra/builder-config.yaml) to write
    # straight into Maple's bespoke ClickHouse schema. Use this for self-
    # hosted Maple deployments that have run Maple's CH migrations against
    # their own ClickHouse cluster (e.g. the in-cluster Altinity
    # ClickHouseInstallation in `clickhouse/`).
    #
    # `mode: replace`  → ship ONLY to ClickHouse. Disables `otlphttp/maple`.
    # `mode: also`     → ship to BOTH `otlphttp/maple` AND ClickHouse.
    #
    # `clickhouseExport` and `tinybirdExport` are mutually exclusive — set at
    # most one. Set the chart `image` to the Maple-built collector when this
    # mode is enabled, since the stock contrib image doesn't include
    # `mapleexporter`.
    clickhouseExport:
        enabled: false
        mode: replace
        # Custom collector image bundling Maple's `mapleexporter`. The stock
        # otel/opentelemetry-collector-contrib image used elsewhere in this
        # chart does NOT include this exporter, so when `enabled: true` the
        # chart auto-switches the pod image to this one. Override only if
        # you've forked + republished the builder.
        image:
            repository: ghcr.io/makisuo/maple/otel-collector-maple
            tag: "0.1.5"
            pullPolicy: IfNotPresent
        # ClickHouse HTTP endpoint. e.g. an in-cluster Altinity-operator CHI:
        # http://clickhouse-clickhouse.clickhouse.svc.cluster.local:8123
        # or a public-facing host: https://maple.dev
        endpoint: ""
        # Database holding Maple's tables. Default matches the migrations.
        database: default
        # Maple org id stamped on every record's `OrgId` column.
        # mapleexporter (>= 0.1.5) writes this to OrgId unconditionally;
        # no upstream resource processor is required.
        orgId: ""
        # Optional: read the org id off a resource attribute instead of
        # using the static `orgId` above. Used for multi-tenant fan-out
        # where a single collector serves multiple Maple orgs and an
        # upstream processor stamps the right id per-record. Leave
        # empty for the typical single-tenant deploy.
        orgIdFromResourceAttribute: ""
        timeout: 30s
        # ClickHouse HTTP basic-auth username.
        username: maple
        # Password for the CH user. Prefer existingSecret in production.
        password:
            value: ""
            existingSecret:
                name: ""
                key: ""
        # Per-signal table name overrides. Defaults match Maple's
        # migrations — change only if you've renamed tables.
        tables:
            traces: traces
            logs: logs
            metricsSum: metrics_sum
            metricsGauge: metrics_gauge
            metricsHistogram: metrics_histogram
            metricsExponentialHistogram: metrics_exponential_histogram
        retryOnFailure:
            enabled: true
            initialInterval: 1s
            maxInterval: 30s
            maxElapsedTime: 300s
        sendingQueue:
            enabled: true
            numConsumers: 8
            queueSize: 10000

image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.141.0"
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

presets:
    otlpReceiver:
        enabled: true
        grpc:
            enabled: true
            containerPort: 4317
            hostPort: 4317
        http:
            enabled: true
            containerPort: 4318
            hostPort: 4318
    hostMetrics:
        enabled: true
        rootPath: /hostfs
        collectionInterval: 30s
        scrapers:
            # system.cpu.utilization is an optional gauge — not on by default in
            # hostmetrics. Maple's listHostsQuery reads this metric (and the memory
            # / filesystem equivalents below) to populate CPU% / Memory% / Disk%
            # on the Infrastructure page, so enable them here.
            cpu:
                metrics:
                    system.cpu.utilization:
                        enabled: true
            load: {}
            memory:
                metrics:
                    system.memory.utilization:
                        enabled: true
            disk:
                exclude:
                    devices:
                        - ^ram\d+$
                        - ^zram\d+$
                        - ^loop\d+$
                        - ^fd\d+$
                        - ^hd[a-z]\d+$
                        - ^sd[a-z]\d+$
                        - ^vd[a-z]\d+$
                        - ^xvd[a-z]\d+$
                        - ^nvme\d+n\d+p\d+$
                    match_type: regexp
            filesystem:
                metrics:
                    system.filesystem.utilization:
                        enabled: true
                exclude_fs_types:
                    fs_types:
                        - autofs
                        - binfmt_misc
                        - bpf
                        - cgroup2
                        - configfs
                        - debugfs
                        - devpts
                        - devtmpfs
                        - fusectl
                        - hugetlbfs
                        - iso9660
                        - mqueue
                        - nsfs
                        - overlay
                        - proc
                        - procfs
                        - pstore
                        - rpc_pipefs
                        - securityfs
                        - selinuxfs
                        - squashfs
                        - sysfs
                        - tracefs
                    match_type: strict
                exclude_mount_points:
                    mount_points:
                        - /dev/*
                        - /proc/*
                        - /sys/*
                        - /run/credentials/*
                        - /run/k3s/containerd/*
                        - /var/lib/docker/*
                        - /var/lib/containers/storage/*
                        - /var/lib/kubelet/*
                        - /snap/*
                    match_type: regexp
            network:
                exclude:
                    interfaces:
                        - ^veth.*$
                        - ^docker.*$
                        - ^br-.*$
                        - ^flannel.*$
                        - ^cali.*$
                        - ^cbr.*$
                        - ^cni.*$
                        - ^dummy.*$
                        - ^tailscale.*$
                        - ^lo$
                    match_type: regexp
    kubeletMetrics:
        enabled: true
        collectionInterval: 30s
        authType: serviceAccount
        endpoint: https://${env:K8S_HOST_IP}:10250
        insecureSkipVerify: true
        extraMetadataLabels:
            - container.id
            - k8s.volume.type
        metricGroups:
            - container
            - pod
            - node
            - volume
        metrics:
            k8s.node.cpu.usage:
                enabled: true
            k8s.node.uptime:
                enabled: true
            k8s.pod.cpu.usage:
                enabled: true
            k8s.pod.cpu_limit_utilization:
                enabled: true
            k8s.pod.cpu_request_utilization:
                enabled: true
            k8s.pod.memory_limit_utilization:
                enabled: true
            k8s.pod.memory_request_utilization:
                enabled: true
            container.cpu.usage:
                enabled: true
            k8s.container.cpu_limit_utilization:
                enabled: true
            k8s.container.cpu_request_utilization:
                enabled: true
            k8s.container.memory_limit_utilization:
                enabled: true
            k8s.container.memory_request_utilization:
                enabled: true
    clusterMetrics:
        enabled: true
        collectionInterval: 30s
        nodeConditionsToReport:
            - Ready
            - MemoryPressure
            - DiskPressure
            - PIDPressure
            - NetworkUnavailable
        allocatableTypesToReport:
            - cpu
            - memory
        resourceAttributes:
            k8s.pod.qos_class:
                enabled: true
            k8s.kubelet.version:
                enabled: true
            container.runtime:
                enabled: true
            container.runtime.version:
                enabled: true
            k8s.container.status.last_terminated_reason:
                enabled: true
        metrics:
            k8s.node.condition:
                enabled: true
            k8s.pod.status_reason:
                enabled: true
    fargateMetrics:
        # EKS Fargate pods can't host the DaemonSet (no shared host), so the
        # cluster collector scrapes /metrics/cadvisor on each Fargate-typed node
        # via the API server proxy and re-shapes the cAdvisor metrics into the
        # OTel kubeletstats convention so the Pods/Workloads UI lights up.
        # Off by default — enable on EKS clusters that use Fargate.
        enabled: false
        collectionInterval: 30s
    podLogs:
        enabled: false
        startAt: end
        includeFilePath: true
        includeFileName: false
        include:
            - /var/log/pods/*/*/*.log
        exclude:
            - /var/log/pods/*_kube-system_*/*/*.log
            - /var/log/pods/*_{{ include "maple-k8s-infra.fullname" . }}-*/*/*.log
        multiline: null
        operators:
            - id: container-parser
              type: container
    k8sEvents:
        enabled: false
        namespaces: []

# Auto-instrumentation glue — bundles the OpenTelemetry Operator and ships a
# pre-baked Instrumentation CR (`maple-default`). The CR injects ONLY env vars
# (downward-API → OTEL_RESOURCE_ATTRIBUTES + OTEL_EXPORTER_OTLP_ENDPOINT) into
# pods that opt in via the namespace annotation:
#
#   kubectl annotate namespace <ns> \
#     instrumentation.opentelemetry.io/inject-sdk=maple/maple-default
#
# We deliberately do NOT inject SDK init containers — users bring their own
# OTel SDK. This chart is responsible for the deploy-time plumbing only.
#
# When enabled, the OpenTelemetry Operator is installed as a subchart with
# auto-generated webhook certs (no cert-manager dependency). Users running
# their own operator should set operator.enabled=false; the Instrumentation CR
# still renders so they can copy it into their setup.
autoInstrumentation:
    enabled: true
    operator:
        enabled: true
    # Namespace + name of the Instrumentation CR. Users reference this from
    # their pod / namespace annotations. Default lives in this chart's release
    # namespace.
    instrumentation:
        name: maple-default
        # Namespaces listed here get the namespace annotation auto-applied at
        # install/upgrade time (creates Namespace objects if they don't exist).
        # Useful for GitOps setups where namespace manifests are managed elsewhere
        # but you still want one-shot opt-in. Example:
        #   autoInstrument:
        #     - shop
        #     - billing
        autoInstrumentNamespaces: []
        # Override the agent OTLP endpoint that pods will be told to export to.
        # Empty = derive from the agent Service in this release's namespace.
        otlpEndpointOverride: ""

# OpenTelemetry Operator subchart configuration. Only used when
# autoInstrumentation.operator.enabled=true. Keys mirror the upstream chart;
# we set sensible defaults that don't require cert-manager.
opentelemetryOperator:
    manager:
        # Disable the collector CRD reconciler — we don't ship OpenTelemetryCollector
        # CRs from this chart and users who want them can enable it later.
        collectorImage:
            repository: otel/opentelemetry-collector-contrib
        # Restrict watched resources to Instrumentation only — keeps RBAC small.
        featureGates: ""
    admissionWebhooks:
        certManager:
            enabled: false
        autoGenerateCert:
            enabled: true
            recreate: false
    # Skip installing the operator's CRDs if the user already has them (e.g. they
    # ran an upstream operator install before). Set to false to opt out.
    crds:
        create: true

processors:
    memoryLimiter:
        checkInterval: 1s
        limitMiB: 512
        spikeLimitMiB: 128
    batch:
        timeout: 1s
        sendBatchSize: 8192
        sendBatchMaxSize: 10000
    kubernetesAttributes:
        enabled: true
        passthrough: false
        filter:
            node_from_env_var: K8S_NODE_NAME
        podAssociation:
            - sources:
                  - from: resource_attribute
                    name: k8s.pod.ip
            - sources:
                  - from: resource_attribute
                    name: k8s.pod.uid
            # Used by the Fargate metrics pipeline: cAdvisor scrapes don't carry
            # pod IP / UID, so we associate by name + namespace (set in
            # transform/fargate before this processor runs).
            - sources:
                  - from: resource_attribute
                    name: k8s.pod.name
                  - from: resource_attribute
                    name: k8s.namespace.name
            - sources:
                  - from: connection
        extract:
            metadata:
                - k8s.namespace.name
                - k8s.deployment.name
                - k8s.statefulset.name
                - k8s.daemonset.name
                - k8s.cronjob.name
                - k8s.job.name
                - k8s.node.name
                - k8s.node.uid
                - k8s.pod.name
                - k8s.pod.uid
                - k8s.pod.start_time
            labels:
                # EKS sets this on each Fargate "node" (which is per-pod) — propagating
                # it to ResourceAttributes lets the query layer / UI distinguish
                # ec2-launched vs fargate-launched pods.
                - tag_name: eks.amazonaws.com/compute-type
                  key: eks.amazonaws.com/compute-type
                  from: node
            annotations: []
    resourceDetection:
        enabled: true
        timeout: 2s
        override: false

agent:
    enabled: true
    replicaCount: 1
    hostNetwork: false
    minReadySeconds: 5
    serviceAccount:
        create: true
        name: ""
    service:
        enabled: true
        type: ClusterIP
        annotations: {}
    # Public Ingress in front of the agent's OTLP HTTP receiver. Use this to
    # accept OTLP from off-cluster sources (Cloudflare Workers, Vercel apps,
    # anything outside the EKS cluster). One Ingress with multiple `hosts`
    # generates a shared TLS cert and routes /v1/{traces,logs,metrics} to the
    # in-cluster agent Service on its OTLP HTTP port.
    #
    # Bring your own ingress controller + cert issuer — this chart doesn't
    # install them. Defaults assume nginx-ingress + cert-manager.
    ingress:
        enabled: false
        ingressClassName: nginx
        # cert-manager.io ClusterIssuer name. Set to empty string to skip the
        # cert-manager annotation (e.g. for ALBs handling TLS via ACM).
        clusterIssuer: letsencrypt-production
        # External hostnames the ingress should accept. cert-manager issues a
        # single cert covering all of them. Add aliases here for backwards-
        # compatible URLs (e.g. an old `signoz.example.com` redirected to the
        # new collector).
        hosts: []
        # Path prefix to match. OTLP HTTP receivers expose
        # /v1/{traces,logs,metrics}; the default prefix `/v1/` covers all
        # three signals while leaving the root unrouted.
        path: /v1/
        pathType: Prefix
        # Free-form annotations merged onto the Ingress (auth, rate-limits,
        # CORS, body-size, source-range allowlist, etc.). The chart adds
        # cert-manager.io/cluster-issuer and a 0-byte body-size by default.
        annotations: {}
        # Optional override for the TLS Secret name. Empty = derived from the
        # agent fullname.
        tlsSecretName: ""
    resources:
        requests:
            cpu: 100m
            memory: 256Mi
        limits:
            memory: 768Mi
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    priorityClassName: ""
    securityContext: {}
    podSecurityContext: {}
    extraEnv: []
    extraVolumes: []
    extraVolumeMounts: []

clusterCollector:
    enabled: true
    replicaCount: 1
    minReadySeconds: 5
    progressDeadlineSeconds: 120
    serviceAccount:
        create: true
        name: ""
    service:
        enabled: true
        type: ClusterIP
        annotations: {}
    resources:
        requests:
            cpu: 100m
            memory: 256Mi
        limits:
            memory: 768Mi
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    priorityClassName: ""
    securityContext: {}
    podSecurityContext: {}
    extraEnv: []
    extraVolumes: []
    extraVolumeMounts: []

config:
    serviceTelemetry:
        logs:
            level: info
