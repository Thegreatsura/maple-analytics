name: Deploy PR Preview (Cloudflare via Alchemy)

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - closed

concurrency:
    group: pr-preview-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read
    deployments: write
    id-token: write # Infisical OIDC machine-identity auth

jobs:
    deploy-pr-preview:
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        runs-on: blacksmith-4vcpu-ubuntu-2404
        # `pr-preview` environment must require manual approval in repo settings.
        # This blocks PR-controlled code (install scripts, build steps) from
        # accessing Infisical secrets until a maintainer reviews the diff.
        # `url` surfaces the deployed web app as a clickable deployment on the PR
        # (empty on `closed`, when the deploy step is skipped).
        environment:
            name: pr-preview
            url: ${{ steps.deploy.outputs.web_url }}
        env:
            # Uses Infisical's default `dev` environment for now; swap to a
            # dedicated `preview` env later if PR previews need isolated secrets.
            INFISICAL_ENV_SLUG: dev
            PR_NUMBER: ${{ github.event.pull_request.number }}
            PR_BRANCH: ${{ github.head_ref }}
            # Stamped onto deployed telemetry as `deployment.commit_sha`. Use the PR
            # head SHA (github.sha is the merge commit on pull_request events).
            COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
            VITE_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup mise (toolchain)
              uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - name: Load deployment secrets from Infisical
              uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
              with:
                  method: "oidc"
                  identity-id: ${{ secrets.INFISICAL_MACHINE_IDENTITY_ID }}
                  project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
                  env-slug: ${{ env.INFISICAL_ENV_SLUG }}
                  export-type: "env"
                  secret-path: "/"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # Tinybird's TypeScript resource generator loads @maple/domain from source,
            # whose span-display helpers import this package through its dist exports.
            # A clean runner has no dist/ until the workspace dependency is built.
            - name: Build Tinybird TypeScript workspace dependencies
              if: ${{ github.event.action != 'closed' }}
              run: bun turbo build --filter=@maple-dev/clickhouse-builder

            # Needed for both branch create (deploy) and rm (close). `tb` is the
            # real Tinybird CLI (branch commands live there, not in `bunx tinybird`).
            - name: Install Tinybird CLI
              run: curl https://tinybird.co | sh

            # Create/refresh an ephemeral Tinybird branch `pr_<n>` seeded with the
            # latest prod partition, deploy this PR's schema into it, and override
            # TINYBIRD_HOST/TINYBIRD_TOKEN (from Infisical `dev`) with the branch's
            # values so the Alchemy deploy below binds the whole stack to the branch.
            - name: Create/refresh Tinybird PR branch
              if: ${{ github.event.action != 'closed' }}
              run: bun scripts/tinybird-pr-branch.ts up "$PR_NUMBER"

            - name: Install PlanetScale CLI
              if: ${{ env.PLANETSCALE_SERVICE_TOKEN != '' }}
              uses: planetscale/setup-pscale-action@v1

            # The PlanetScale + Alchemy steps below are gated on
            # PLANETSCALE_SERVICE_TOKEN: until the `dev` Infisical environment carries the
            # PlanetScale service token (+ PLANETSCALE_SERVICE_TOKEN_ID,
            # PLANETSCALE_ORG), PR previews can't provision a Postgres branch, so
            # they SKIP cleanly (the check stays green) rather than fail every PR.
            # Adding the token activates per-PR preview deploys automatically.

            # Create/refresh the ephemeral PlanetScale Postgres branch `pr-<n>`
            # (created empty — parity with the old per-PR empty D1), mint a
            # credential, and export MAPLE_PG_URL to GITHUB_ENV so the migrate +
            # Alchemy steps below bind to the branch.
            - name: Create/refresh PlanetScale PR branch
              if: ${{ github.event.action != 'closed' && env.PLANETSCALE_SERVICE_TOKEN != '' }}
              run: bun scripts/planetscale-pr-branch.ts up "$PR_NUMBER"

            - name: Run database migrations
              if: ${{ github.event.action != 'closed' && env.PLANETSCALE_SERVICE_TOKEN != '' }}
              run: DATABASE_URL="$MAPLE_PG_URL" bun run --cwd packages/db db:migrate

            # Create/refresh an Electric Cloud environment `pr-<n>` + a Postgres
            # source pointed at this PR's PlanetScale branch (MAPLE_PG_URL), and
            # export ELECTRIC_URL/ELECTRIC_SOURCE_ID/ELECTRIC_SECRET to GITHUB_ENV so
            # the Alchemy deploy below binds the electric-sync worker to it. Runs
            # after migrations so `0009_electric_publication` exists. Gated on
            # ELECTRIC_API_TOKEN: until the `dev` Infisical environment carries the
            # Electric CLI token (+ ELECTRIC_PROJECT_ID), previews SKIP cleanly —
            # the electric-sync worker deploys unconfigured (503) and the web app
            # stays on its effect-atom fetches. Adding the token activates per-PR
            # sync automatically.
            - name: Create/refresh Electric Cloud PR source
              if: ${{ github.event.action != 'closed' && env.ELECTRIC_API_TOKEN != '' && env.PLANETSCALE_SERVICE_TOKEN != '' }}
              run: bun scripts/electric-pr-branch.ts up "$PR_NUMBER"

            - name: Deploy PR preview stack with Alchemy
              id: deploy
              if: ${{ github.event.action != 'closed' && env.PLANETSCALE_SERVICE_TOKEN != '' }}
              run: bun run alchemy:deploy:pr

            - name: Destroy PR preview stack with Alchemy
              if: ${{ github.event.action == 'closed' && env.PLANETSCALE_SERVICE_TOKEN != '' }}
              # MAPLE_PG_URL is generated by the deploy run and does not survive
              # into this separate close-event runner. Destroy only needs a valid
              # URL so alchemy.run.ts can reconstruct the resource graph from
              # state; it never connects to this placeholder origin.
              env:
                  MAPLE_PG_URL: postgres://preview-teardown:preview-teardown@127.0.0.1:5432/postgres
              run: bun run alchemy:destroy:pr

            # After the stack (and its Hyperdrive config) is destroyed. PS-DEV
            # branches bill for time used — this must run on every PR close.
            - name: Remove PlanetScale PR branch
              if: ${{ github.event.action == 'closed' && env.PLANETSCALE_SERVICE_TOKEN != '' }}
              run: bun scripts/planetscale-pr-branch.ts down "$PR_NUMBER"

            # Delete the Electric Cloud environment `pr-<n>` (cascades its source).
            # Each source holds a PlanetScale replication slot and a plan
            # max-databases slot, so teardown on close is mandatory.
            - name: Remove Electric Cloud PR source
              if: ${{ github.event.action == 'closed' && env.ELECTRIC_API_TOKEN != '' }}
              run: bun scripts/electric-pr-branch.ts down "$PR_NUMBER"

            # Tear the branch down after the stack — branches share compute with
            # production, so this must run on every PR close.
            - name: Remove Tinybird PR branch
              if: ${{ github.event.action == 'closed' }}
              run: bun scripts/tinybird-pr-branch.ts down "$PR_NUMBER"
