name: Local Binary Release

# Builds the distributable `maple` local binary (a single Bun-compiled
# executable: CLI + OTLP-ingest/query server + bundled SPA) for macOS and Linux,
# then attaches a 2-file bundle (`maple` + `libchdb.so`) per platform to a
# GitHub release.
#
# Why native runners (no cross-compilation): the bundle ships a prebuilt,
# platform-specific `libchdb.so` (downloaded from chdb-io/chdb-core releases),
# which `maple` dlopens via bun:ffi at runtime. We fetch the engine matching the
# host, so each target is built on a matching native runner.
#
# Each build job publishes its own tarball immediately after packaging — no
# separate aggregation step — so a slow or queued runner can never block the
# other platforms from appearing on the release.
#
# Triggers:
#   - push a `v*` tag       → build + publish each platform's bundle as it finishes
#   - workflow_dispatch     → build + upload artifacts (no release unless `tag` input given)

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Existing tag to publish the bundles to (optional). Leave blank to only produce build artifacts."
                required: false
                type: string

concurrency:
    group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                # No x86_64-apple-darwin: GitHub retired the macos-13 Intel image
                # (Dec 2025), so that job sat queued forever. The next Intel label
                # would be macos-15-intel, but Intel macOS is EOL on GitHub in Fall
                # 2027 — not worth carrying. Intel-Mac users build from source.
                include:
                    - target: aarch64-apple-darwin
                      runner: macos-14
                      os: macos
                    - target: x86_64-unknown-linux-gnu
                      runner: ubuntu-22.04
                      os: linux
                    - target: aarch64-unknown-linux-gnu
                      runner: ubuntu-24.04-arm
                      os: linux
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - name: Install JS dependencies
              run: bun install --frozen-lockfile

            - name: Resolve version
              id: version
              run: |
                  set -euo pipefail
                  ref="${{ github.ref }}"
                  input_tag="${{ github.event.inputs.tag }}"
                  if [ -n "$input_tag" ]; then
                    version="$input_tag"
                  elif [[ "$ref" == refs/tags/* ]]; then
                    version="${ref#refs/tags/}"
                  else
                    version="$(git rev-parse --short HEAD)"
                  fi
                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Build local binary bundle
              # Builds the SPA, inlines it into the binary, compiles apps/cli with
              # `bun build --compile`, and downloads the matching libchdb beside it.
              # Output bundle lands in ./dist (maple + libchdb.so). MAPLE_BUILD_VERSION
              # bakes the resolved tag into `maple --version`.
              env:
                  MAPLE_BUILD_VERSION: ${{ steps.version.outputs.version }}
              run: scripts/build-local-binary.sh

            - name: Ad-hoc codesign (macOS)
              # bun-compiled binaries run locally once Gatekeeper quarantine is
              # cleared; ad-hoc sign both files for good measure. Production
              # distribution should layer Developer ID signing + notarization on
              # top (requires APPLE_* secrets not configured here).
              if: ${{ matrix.os == 'macos' }}
              run: |
                  set -euo pipefail
                  codesign --force --sign - dist/libchdb.so
                  codesign --force --sign - dist/maple
                  codesign --verify --verbose dist/maple

            - name: Package bundle
              id: package
              run: |
                  set -euo pipefail
                  version="${{ steps.version.outputs.version }}"
                  target="${{ matrix.target }}"
                  name="maple-${version}-${target}"
                  staging="$RUNNER_TEMP/$name"
                  rm -rf "$staging"
                  mkdir -p "$staging"
                  cp dist/maple "$staging/maple"
                  cp dist/libchdb.so "$staging/libchdb.so"
                  # Smoke-check the relocatable 2-file bundle (maple + libchdb.so).
                  ( cd "$staging" && ./maple --help >/dev/null 2>&1 ) || \
                    echo "::warning::'maple --help' smoke check did not exit cleanly on $target"
                  tarball="$RUNNER_TEMP/${name}.tar.gz"
                  tar -C "$RUNNER_TEMP" -czf "$tarball" "$name"
                  if command -v shasum >/dev/null 2>&1; then
                    shasum -a 256 "$tarball" | awk '{print $1}' > "${tarball}.sha256"
                  else
                    sha256sum "$tarball" | awk '{print $1}' > "${tarball}.sha256"
                  fi
                  echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
                  echo "name=$name" >> "$GITHUB_OUTPUT"

            - name: Upload build artifact
              uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
              with:
                  name: ${{ steps.package.outputs.name }}
                  path: |
                      ${{ steps.package.outputs.tarball }}
                      ${{ steps.package.outputs.tarball }}.sha256
                  if-no-files-found: error
                  retention-days: 7

            - name: Publish to release
              # Each platform publishes its own tarball as soon as it's built — no
              # waiting for other platforms. `gh release create` is idempotent (the
              # `|| true` swallows the "already exists" error from concurrent jobs);
              # `gh release upload --clobber` is safe to re-run.
              if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != '' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  ref="${{ github.ref }}"
                  input_tag="${{ github.event.inputs.tag }}"
                  if [ -n "$input_tag" ]; then
                    TAG="$input_tag"
                  else
                    TAG="${ref#refs/tags/}"
                  fi
                  tarball="${{ steps.package.outputs.tarball }}"
                  # Create the release if it doesn't exist yet. Multiple platforms
                  # may race here; ignore the "already exists" error.
                  # Write notes to a file using printf so we avoid heredoc indentation
                  # issues inside a YAML literal block scalar.
                  printf '%s\n\n%s\n```\n%s\n```\n\n%s\n' \
                    'Local Maple (`maple start`) bundles.' \
                    '**Install (macOS / Linux):**' \
                    'curl -fsSL https://maple.dev/cli/install | sh' \
                    'Or download a bundle below. Each archive contains `maple` + `libchdb.so` — keep both in the same directory. macOS: run `xattr -dr com.apple.quarantine maple libchdb.so` after extracting.' \
                    > "$RUNNER_TEMP/release-notes.md"
                  gh release create "$TAG" --repo "$REPO" \
                    --title "$TAG" \
                    --notes-file "$RUNNER_TEMP/release-notes.md" 2>/dev/null || true
                  gh release upload "$TAG" "$tarball" "${tarball}.sha256" \
                    --repo "$REPO" --clobber
