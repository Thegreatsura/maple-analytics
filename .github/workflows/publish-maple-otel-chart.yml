name: Publish Maple OTel Chart

on:
    workflow_dispatch:
    push:
        tags:
            - "maple-otel-v*"

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: publish-charts
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

            - name: Publish chart to GHCR
              env:
                  HELM_REGISTRY_USERNAME: ${{ github.actor }}
                  HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
                  HELM_REGISTRY_OWNER: ${{ github.repository_owner }}
              run: ./scripts/publish-maple-otel-chart.sh
