name: MCP Token Cost

# Measures the token cost of the MCP tool definitions (name + description +
# input schema) and posts the per-tool table + a diff vs the PR base to the job
# summary. Informational — tool-description bloat shows up here on every PR.

on:
    pull_request:
        branches: [main]
        paths:
            - "apps/api/src/mcp/**"
            - "packages/domain/src/**"
            - ".github/workflows/token-cost.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    token-cost:
        name: Token Cost
        runs-on: blacksmith-4vcpu-ubuntu-2404
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0

            - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - run: bun install --frozen-lockfile

            # @maple/api's measure-tokens imports query-engine, which pulls the
            # dist-based @maple-dev/clickhouse-builder (+ effect-sdk, browser).
            # Those ship from dist/ and must be built before they can be loaded.
            - name: Build workspace deps
              run: bun run alchemy:build-deps

            - name: Measure (PR head)
              run: bun run --filter @maple/api measure-tokens -- -o "$RUNNER_TEMP/head.json" | tee "$RUNNER_TEMP/head.txt"

            # Re-measure against the base source (reusing the same node_modules) for a
            # best-effort delta. Source-only swap avoids a second install.
            - name: Measure (base)
              continue-on-error: true
              run: |
                  git checkout "${{ github.event.pull_request.base.sha }}" -- apps/api/src packages/domain/src || true
                  bun run --filter @maple/api measure-tokens -- -o "$RUNNER_TEMP/base.json" || echo '{"total":0}' > "$RUNNER_TEMP/base.json"
                  git checkout HEAD -- apps/api/src packages/domain/src || true

            - name: Summary
              run: |
                  head=$(jq '.total' "$RUNNER_TEMP/head.json")
                  base=$(jq '.total' "$RUNNER_TEMP/base.json" 2>/dev/null || echo 0)
                  delta=$((head - base))
                  {
                    echo "## MCP tool-definition token cost"
                    echo ""
                    echo "**Total: ${head} tokens** (base: ${base}, delta: ${delta})"
                    echo ""
                    echo '```'
                    cat "$RUNNER_TEMP/head.txt"
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
