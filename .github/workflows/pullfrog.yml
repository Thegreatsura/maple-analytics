# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
    workflow_dispatch:
        inputs:
            prompt:
                type: string
                description: Agent prompt
            name:
                type: string
                description: Run name

permissions:
    id-token: write
    contents: write
    pull-requests: write
    issues: write
    actions: read
    checks: read

jobs:
    pullfrog:
        runs-on: ubuntu-latest
        # `pullfrog-agent` environment must require manual approval in repo
        # settings. The agent action receives a prompt that influences code
        # execution with repo write + many provider API keys, so dispatch
        # should be gated behind reviewer approval.
        environment: pullfrog-agent
        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 1
            - name: Run agent
              uses: pullfrog/pullfrog@27557aef1ccff9b9ea531324824daa1f86c066c4 # v0.1.29
              with:
                  prompt: ${{ inputs.prompt }}
              env:
                  # add at least one provider API key
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
                  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
                  MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
