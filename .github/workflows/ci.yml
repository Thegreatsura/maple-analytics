name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    typescript:
        name: TypeScript
        runs-on: blacksmith-4vcpu-ubuntu-2404
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - run: bun install --frozen-lockfile

            # Shared design tokens live in packages/ui/src/styles/tokens.css;
            # fails if an app re-declares one (landing ↔ web drift guard).
            - run: bun run check:tokens

            - run: bun turbo typecheck test build --filter='!@maple/ingest'

            # Guard the code-split web bundle: initial-load gzip budget and no
            # chat/replay code in the startup graph. Reads the dist/ the turbo
            # build step just produced (or restored from cache).
            - name: Web bundle budget
              run: bun run check:bundle
              working-directory: apps/web

    knip:
        name: Knip
        runs-on: blacksmith-4vcpu-ubuntu-2404
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - run: bun install --frozen-lockfile

            - run: bun knip

    shell:
        name: Shell
        runs-on: blacksmith-4vcpu-ubuntu-2404
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            # shellcheck is preinstalled on the ubuntu-latest runner image.
            - name: shellcheck
              run: shellcheck scripts/install.sh scripts/uninstall.sh scripts/build-local-binary.sh apps/cli/test/native-checkpoint-smoke.sh

            # Syntax-check the POSIX installers against the actual /bin/sh they claim.
            - name: sh -n
              run: |
                  sh -n scripts/install.sh
                  sh -n scripts/uninstall.sh

    local-checkpoint-native:
        name: Local checkpoint native
        runs-on: blacksmith-4vcpu-ubuntu-2404
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - run: bun install --frozen-lockfile

            - name: Build native local bundle
              run: scripts/build-local-binary.sh

            - name: Run repeated checkpoint restore and fresh-process reopen smoke
              env:
                  KEEP_ROOT: "1"
                  TMPDIR: ${{ runner.temp }}/maple-native-checkpoint
              run: |
                  mkdir -p "$TMPDIR"
                  apps/cli/test/native-checkpoint-smoke.sh "$GITHUB_WORKSPACE/dist"

            - name: Upload checkpoint failure evidence
              if: ${{ failure() }}
              uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
              with:
                  name: native-checkpoint-failure-${{ github.run_id }}
                  path: ${{ runner.temp }}/maple-native-checkpoint
                  if-no-files-found: ignore

    service-map-perf:
        name: Service Map Perf
        runs-on: blacksmith-4vcpu-ubuntu-2404
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - run: bun install --frozen-lockfile

            # The perf dev server (vite) resolves @maple-dev/browser and
            # @maple-dev/effect-sdk from their built dist/ (gitignored), so build
            # web's workspace deps before booting it — otherwise vite fails to
            # resolve those imports and the bench page never signals ready.
            - name: Build web workspace deps
              run: bun turbo build --filter=@maple/web^...

            # Headless browsers + their system libs for the rendering benchmark
            # and the @cross-browser smoke projects (firefox/webkit fail to
            # launch in 1ms if only chromium is installed).
            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium firefox webkit
              working-directory: apps/web

            # Boots a self-hosted dev server (see playwright.config.ts) and runs the
            # canvas-particle rendering gate against the synthetic /service-map-bench
            # route (120 services / 400 edges at high traffic).
            - name: Run perf gate
              run: bun --filter=@maple/web test:perf

    # Note: the `apps/ingest` Rust crate is built and tested by
    # `.github/workflows/ingest-rust-tests.yml`, which also runs the load
    # benchmark and posts results to the PR.
