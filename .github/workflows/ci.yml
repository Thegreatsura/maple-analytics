name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    typescript:
        name: TypeScript
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - run: bun install --frozen-lockfile

            - run: bun turbo typecheck test build --filter='!@maple/ingest'

    knip:
        name: Knip
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - run: bun install --frozen-lockfile

            - run: bun knip

    shell:
        name: Shell
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            # shellcheck is preinstalled on the ubuntu-latest runner image.
            - name: shellcheck
              run: shellcheck scripts/install.sh scripts/uninstall.sh scripts/build-local-binary.sh

            # Syntax-check the POSIX installers against the actual /bin/sh they claim.
            - name: sh -n
              run: |
                  sh -n scripts/install.sh
                  sh -n scripts/uninstall.sh

    service-map-perf:
        name: Service Map Perf
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - run: bun install --frozen-lockfile

            # The perf dev server (vite) resolves @maple-dev/browser and
            # @maple-dev/effect-sdk from their built dist/ (gitignored), so build
            # web's workspace deps before booting it — otherwise vite fails to
            # resolve those imports and the bench page never signals ready.
            - name: Build web workspace deps
              run: bun turbo build --filter=@maple/web^...

            # Headless Chromium + its system libs for the rendering benchmark.
            - name: Install Playwright Chromium
              run: bunx playwright install --with-deps chromium
              working-directory: apps/web

            # Boots a self-hosted dev server (see playwright.config.ts) and runs the
            # canvas-particle rendering gate against the synthetic /service-map-bench
            # route (120 services / 400 edges at high traffic).
            - name: Run perf gate
              run: bun --filter=@maple/web test:perf

    # Note: the `apps/ingest` Rust crate is built and tested by
    # `.github/workflows/ingest-rust-tests.yml`, which also runs the load
    # benchmark and posts results to the PR.
