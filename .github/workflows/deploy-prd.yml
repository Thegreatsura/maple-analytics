name: Deploy PRD (Cloudflare via Alchemy)

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: deploy-prd
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    deploy-prd:
        runs-on: ubuntu-latest
        environment: production
        env:
            DOPPLER_PROJECT: maple
            DOPPLER_CONFIG: prd
            # Stamped onto deployed telemetry as `deployment.commit_sha` (server SDK
            # reads COMMIT_SHA; web build reads VITE_COMMIT_SHA via Vite define).
            COMMIT_SHA: ${{ github.sha }}
            VITE_COMMIT_SHA: ${{ github.sha }}
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup mise (toolchain)
              uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

            - name: Load deployment secrets from Doppler
              uses: dopplerhq/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
              with:
                  doppler-token: ${{ secrets.DOPPLER_TOKEN }}
                  doppler-project: ${{ env.DOPPLER_PROJECT }}
                  doppler-config: ${{ env.DOPPLER_CONFIG }}
                  inject-env-vars: true

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # NOTE: prod schema migrations are applied OUT OF BAND (manually, via
            # `MAPLE_PG_RUNTIME_ROLE=<role> bun run --cwd packages/db ps:apply-schema main`
            # against the direct 5432 port), NOT by this workflow — so a deploy never
            # touches the prod database and needs no MAPLE_PG_URL/admin credential. The
            # worker binds to the pre-configured `maple-prd` Hyperdrive (see
            # apps/api/alchemy.run.ts); MAPLE_PG_RUNTIME_ROLE must be the role embedded
            # in that Hyperdrive's connection so apply-schema re-grants it table access
            # after any rebuild (without it the alerting worker hits "permission denied
            # for table …"). Run `ps:apply-schema main` separately to apply grants alone.
            - name: Deploy PRD stack with Alchemy
              run: bun run alchemy:deploy:prd
