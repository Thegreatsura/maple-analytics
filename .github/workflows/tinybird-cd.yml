name: Tinybird - CD Workflow

on:
    push:
        branches:
            - main
            - master
    workflow_dispatch:
        inputs:
            allow_destructive:
                description: "Allow destructive operations (e.g. removing datasources)"
                required: false
                type: boolean
                default: false

concurrency: ${{ github.workflow }}-${{ github.event.ref }}

permissions:
    contents: read

jobs:
    cd:
        name: Deploy (${{ matrix.target.label }})
        runs-on: ubuntu-latest
        # One leg per long-lived Tinybird workspace. Each GitHub Environment supplies
        # its own TINYBIRD_HOST/TINYBIRD_TOKEN, so the matching workspace admin token
        # scopes each deploy to that workspace — no `--branch`/`__tb__` params needed.
        # Staging is a separate workspace (Tinybird's documented long-lived pattern;
        # branches are ephemeral and share prod compute, so they're unsuitable here).
        strategy:
            fail-fast: false
            matrix:
                target:
                    - label: production
                      environment: tinybird-cd
                    - label: staging
                      environment: tinybird-cd-stg
        environment: ${{ matrix.target.environment }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
            - name: Install dependencies
              # Run install before any secrets are scoped to the deploy step.
              run: bun install --frozen-lockfile
            - name: Deploy project
              env:
                  TINYBIRD_HOST: ${{ secrets.TINYBIRD_HOST }}
                  TINYBIRD_TOKEN: ${{ secrets.TINYBIRD_TOKEN }}
                  ALLOW_DESTRUCTIVE: ${{ github.event.inputs.allow_destructive }}
              run: |
                  set -euo pipefail
                  # Graceful no-op until an environment is provisioned: lets the staging
                  # leg stay green before its workspace/secrets exist, without ever
                  # affecting the production leg (whose token is always set).
                  if [ -z "${TINYBIRD_TOKEN:-}" ]; then
                    echo "::notice::TINYBIRD_TOKEN not set for the '${{ matrix.target.environment }}' environment; skipping Tinybird deploy."
                    exit 0
                  fi
                  HOST_FLAG=()
                  if [ -n "${TINYBIRD_HOST:-}" ]; then
                    HOST_FLAG=(--host "$TINYBIRD_HOST")
                  fi
                  if [ "$ALLOW_DESTRUCTIVE" = "true" ]; then
                    bunx tinybird deploy "${HOST_FLAG[@]}" --allow-destructive-operations
                  else
                    bunx tinybird deploy "${HOST_FLAG[@]}"
                  fi
