name: OTel Collector Maple — tests

on:
    push:
        branches: [main]
        paths:
            - "packages/otel-collector-maple-exporter/**"
            - ".github/workflows/otel-collector-maple-tests.yml"
    pull_request:
        paths:
            - "packages/otel-collector-maple-exporter/**"
            - ".github/workflows/otel-collector-maple-tests.yml"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/otel-collector-maple-exporter
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
              with:
                  # Match `go 1.25.0` in packages/otel-collector-maple-exporter/go.mod.
                  go-version-file: packages/otel-collector-maple-exporter/go.mod
                  cache: true
                  cache-dependency-path: packages/otel-collector-maple-exporter/go.sum

            - name: gofmt -l
              run: |
                  diff=$(gofmt -l .)
                  if [ -n "$diff" ]; then
                    echo "::error::gofmt found unformatted files:"
                    echo "$diff"
                    exit 1
                  fi

            - name: go vet
              run: go vet ./...

            - name: go test
              run: go test -race -count=1 ./...
